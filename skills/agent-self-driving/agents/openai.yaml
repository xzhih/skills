interface:
  display_name: "Agent Self-Driving"
  short_description: "Run evidence-backed long tasks"
  default_prompt: >-
    Use $agent-self-driving as the sole opt-in controller: delegate lifecycle and
    leaf work to their owners, use agent-runtime for worker lifecycle and the
    applicable participant/model/authorization/session gates, verify returned
    evidence, and continue until completion or a true user decision.
policy:
  allow_implicit_invocation: false
