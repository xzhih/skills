interface:
  display_name: "Multi-Agent Orchestration"
  short_description: "Run long tasks with independent agents"
  default_prompt: >-
    Use $multi-agent-orchestration for this task. Read the skill, choose the
    lowest sufficient intensity, and use agents only when they improve target
    correctness, review, verification, or delivery. Run the Heavy Task Run Loop
    and durable document state only for Level 3-4 work. If status is
    in_progress, continue with the next bounded action unless a real pause
    condition applies.
