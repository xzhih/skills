interface:
  display_name: "Multi-Agent Orchestration"
  short_description: "Dispatch multi-agent workflows"
  default_prompt: >-
    Use $multi-agent-orchestration at the lightest sufficient intensity to
    dispatch multi-agent discussion, artifact review, parallel lanes,
    integration review, Spec/Eval delivery, external-agent policy, and
    review-repair while treating agent reports as claims.
policy:
  allow_implicit_invocation: false
